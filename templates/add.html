<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มสินค้า</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f6f8;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        h2 {
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .btn-save {
            background: #2563eb;
        }

        .btn-back {
            background: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>เพิ่มสินค้า</h2>

        <form method="POST">
            <div class="form-group">
                <label>ชื่อสินค้า</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>ราคา</label>
                <input type="number" name="price" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label>จำนวนคงเหลือ</label>
                <input type="number" name="stock" min="0" value="0" required>
            </div>

            <div class="form-group">
                <label>หมวดหมู่</label>
                <select name="category_id">
                    <option value="">เลือกหมวดหมู่</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-save">บันทึก</button>
                <a href="{{ url_for('index') }}" class="btn btn-back">กลับ</a>
            </div>
        </form>
    </div>
</body>
</html>
